# ---------------------------------------------------------------------------
# Cloud Build pipeline for wasi_pg_client
#
# This pipeline handles:
#   1. CI verification (every push)       — fmt, clippy, test, wasm build
#   2. Release publishing (tag push only) — crates.io publish for all 4 crates
#
# ---------------------------------------------------------------------------
# GCP Cloud Build setup (one-time):
# ---------------------------------------------------------------------------
#
# 1. CONNECT YOUR REPOSITORY
#    gcloud builds triggers create github \
#      --name="wasi-pg-client-ci" \
#      --repo="your-org/wasi-pg-client" \
#      --branch-pattern=".*" \
#      --build-config="cloudbuild.yaml"
#
# 2. CREATE THE RELEASE TRIGGER (tag-only, for crates.io publishing)
#    gcloud builds triggers create github \
#      --name="wasi-pg-client-release" \
#      --repo="your-org/wasi-pg-client" \
#      --tag-pattern="v*" \
#      --build-config="cloudbuild.yaml"
#
# 3. STORE YOUR CRATES.IO TOKEN IN SECRET MANAGER
#    Go to https://crates.io/settings/tokens → "New Token" → copy value.
#    Then:
#      echo -n "cio...your-token-here..." | gcloud secrets create cargo-registry-token \
#        --data-file=-
#
# 4. GRANT CLOUD BUILD ACCESS TO THE SECRET
#    In the GCP Console → IAM → find the Cloud Build service account
#    (<project-number>@cloudbuild.gserviceaccount.com) → add role
#    "Secret Manager Secret Accessor" on the secret.
#
# ---------------------------------------------------------------------------
# Prerequisites for runners:
# ---------------------------------------------------------------------------
# The pipeline uses the official rust:1.81 image which ships with cargo.
# We install wasm32-wasip2 target and clippy/rustfmt on every run (~30s).
# Consider building a custom image with these pre-installed for speed:
#
#   FROM rust:1.81
#   RUN rustup component add rustfmt clippy && \
#       rustup target add wasm32-wasip2
#
# Then replace `name: rust:1.81` with `name: <your-image>`.
# ---------------------------------------------------------------------------

timeout: 3600s

options:
  logging: CLOUD_LOGGING_ONLY

# ---------------------------------------------------------------------------
# Secrets (only used by the publish step)
# ---------------------------------------------------------------------------
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/cargo-registry-token/versions/latest
      env: CARGO_REGISTRY_TOKEN

# ---------------------------------------------------------------------------
# Step 1 — CI verification (runs on every push, including tags)
# ---------------------------------------------------------------------------
steps:
  - id: verify-workspace
    name: rust:1.81
    entrypoint: bash
    env:
      - CARGO_HOME=/workspace/.cargo-home
      - RUSTUP_HOME=/workspace/.rustup
      - CARGO_TARGET_DIR=/workspace/target
    args:
      - -ceu
      - |
        echo "=== Rust toolchain ==="
        rustup show
        rustc --version
        cargo --version

        echo "=== Installing components ==="
        rustup component add rustfmt clippy
        rustup target add wasm32-wasip2

        echo "=== cargo fmt ==="
        cargo fmt --all --check

        echo "=== cargo clippy ==="
        cargo clippy --workspace --all-targets -- -D warnings

        echo "=== cargo check ==="
        cargo check --workspace --all-targets

        echo "=== cargo test (link check) ==="
        cargo test --workspace --all-targets --no-run

        echo "=== cargo test (lib, all features) ==="
        cargo test -p wasi-pg-client --lib --all-features

        echo "=== cargo test (E2E harnesses — compile only) ==="
        cargo test -p wasi-pg-client --features tokio-transport,tls --test e2e_tls --no-run
        cargo test -p wasi-pg-client --features pool,tokio-transport --test e2e_pool --no-run

        echo "=== cargo build (wasm32-wasip2) ==="
        cargo build --workspace --target wasm32-wasip2

        echo "=== CI verification complete ==="

# ---------------------------------------------------------------------------
# Step 2 — Publish crates to crates.io (tag pushes only)
# ---------------------------------------------------------------------------
  - id: publish-crates
    name: rust:1.81
    entrypoint: bash
    env:
      - CARGO_HOME=/workspace/.cargo-home
      - RUSTUP_HOME=/workspace/.rustup
      - CARGO_TARGET_DIR=/workspace/target
    secretEnv:
      - CARGO_REGISTRY_TOKEN
    args:
      - -ceu
      - |
        # ─────────────────────────────────────────────────────────────────
        # Only run on tag pushes (TAG_NAME is empty on branch pushes)
        # ─────────────────────────────────────────────────────────────────
        if [ -z "$${TAG_NAME:-}" ]; then
          echo "Not a tag build — skipping crate publishing."
          exit 0
        fi

        echo "=== Publishing crates for tag $${TAG_NAME} ==="

        # ─────────────────────────────────────────────────────────────────
        # 0. Validate tag matches workspace version
        # ─────────────────────────────────────────────────────────────────
        EXPECTED_TAG="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"//;s/"//')"
        if [ "$${TAG_NAME}" != "$${EXPECTED_TAG}" ]; then
          echo "ERROR: tag '$${TAG_NAME}' does not match workspace version '$${EXPECTED_TAG}'"
          echo "Update [workspace.package] version in Cargo.toml before tagging."
          exit 1
        fi
        echo "Tag matches workspace version: $${EXPECTED_TAG}"

        # ─────────────────────────────────────────────────────────────────
        # 1. Login to crates.io (token from Secret Manager)
        # ─────────────────────────────────────────────────────────────────
        if [ -z "$${CARGO_REGISTRY_TOKEN:-}" ]; then
          echo "ERROR: CARGO_REGISTRY_TOKEN not set. Check Secret Manager setup."
          exit 1
        fi
        cargo login "$${CARGO_REGISTRY_TOKEN}"

        # ─────────────────────────────────────────────────────────────────
        # 2. Install wasm32 target (some crates need it for --all-targets)
        # ─────────────────────────────────────────────────────────────────
        rustup target add wasm32-wasip2

        # ─────────────────────────────────────────────────────────────────
        # 3. Publish crates in dependency order with a pause between each
        #    so crates.io can index the newly published crate.
        #
    #    Dependency order:
    #      wasi-pg-client (standalone — protocol + types are internal modules)
    #      wasi-pg-pool   (depends on wasi-pg-client)
    #
    #    Only 1 crate is published to crates.io.
    #    pg-protocol, pg-types, and pg-pool are now internal modules.
        # ─────────────────────────────────────────────────────────────────

        echo ""
        echo "=== Publishing wasi-pg-client ==="
        cargo publish -p wasi-pg-client --allow-dirty

        echo ""
        echo "=== All crates published successfully for $${TAG_NAME} ==="

        # ─────────────────────────────────────────────────────────────────
        # 4. (Optional) Create a GitHub Release via gh CLI
        #    Uncomment to auto-generate releases. Requires GITHUB_TOKEN
        #    stored as another Cloud Build secret.
        #
        #    gh release create "$${TAG_NAME}" \
        #      --repo "$${REPO_FULL_NAME}" \
        #      --title "$${TAG_NAME}" \
        #      --notes "See CHANGELOG.md for details." \
        #      --generate-notes
        # ─────────────────────────────────────────────────────────────────

# ---------------------------------------------------------------------------
# Artifacts (always uploaded, even on verification builds)
# ---------------------------------------------------------------------------
artifacts:
  objects:
    location: gs://${PROJECT_ID}_cloudbuild/artifacts/${BUILD_ID}
    paths:
      - target/wasm32-wasip2/**
      - Cargo.lock
      - cloudbuild.yaml
